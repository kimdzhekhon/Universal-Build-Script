name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-and-skill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.9"

      - name: Validate Bash syntax
        run: bash -n build.sh install.sh scripts/*.sh scripts/lib/*.sh tests/*.sh

      - name: Validate Python core
        run: python -m py_compile scripts/ubs.py scripts/ubs_mcp.py tests/test_python_core.py tests/test_mcp.py

      - name: Run behavior tests
        run: |
          python tests/test_python_core.py
          python tests/test_mcp.py
          bash tests/test-detection.sh
          bash tests/test-install.sh
          bash tests/test-python-adapters.sh
          bash tests/test-update.sh

      - name: Validate Rust helper
        run: bash tests/test-rust-helper.sh

      - name: Validate update manifest
        run: |
          scripts/generate-update-manifest.sh > /tmp/update-manifest.txt
          diff -u scripts/update-manifest.txt /tmp/update-manifest.txt

      - name: Validate Flutter export template
        run: python -c 'import plistlib; plistlib.load(open("templates/flutter/ExportOptions.plist", "rb"))'

      - name: Validate privacy ignores
        run: |
          for path in \
            .env .env.macos signing/App.provisionprofile signing/app.entitlements \
            build/app.aab dist/app.js src-tauri/target/release/app; do
            git check-ignore -q "$path"
          done
          if git check-ignore -q .env.example || git check-ignore -q .env.macos.example; then
            echo "Environment example files must remain trackable" >&2
            exit 1
          fi

      - name: Validate multilingual documentation and diagrams
        run: |
          python - <<'PY'
          from pathlib import Path

          documents = [
              Path("README.md"),
              Path("README.en.md"),
              Path("README.ja.md"),
              Path("README.zh-CN.md"),
          ]
          language_links = [str(path) for path in documents]
          for document in documents:
              text = document.read_text(encoding="utf-8")
              assert text.strip(), f"empty document: {document}"
              for link in language_links:
                  assert f"]({link})" in text, f"{document} is missing language link {link}"
              assert text.count("```mermaid") >= 6, f"{document} needs at least six diagrams"
              assert text.count("```") % 2 == 0, f"unbalanced code fences: {document}"
              for required in (
                  "UBS_JOBS", "UBS_INSTALL_MODE", "UBS_MANAGE_GITIGNORE",
                  "UBS_GRADLE_FLAGS", "tests/test-install.sh",
                  "tests/test-python-adapters.sh", "graph --json",
                  "ubs.dependencies.json", "ios-xcode", "scripts/ubs_mcp.py",
                  "UBS_MCP_ROOT", "UBS_XCODE_SCHEME",
              ):
                  assert required in text, f"{document} is missing 3.3 reference {required}"
          print("multilingual README and Mermaid diagrams are valid")
          PY

      - name: Validate AI skill metadata
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          skill_text = Path("skills/universal-build/SKILL.md").read_text(encoding="utf-8")
          _, frontmatter, body = skill_text.split("---", 2)
          interface = Path("skills/universal-build/agents/openai.yaml").read_text(encoding="utf-8")

          assert re.search(r"(?m)^name:\s*universal-build\s*$", frontmatter)
          assert re.search(r"(?m)^description:\s*\S", frontmatter)
          assert body.strip()
          assert 'display_name: "Universal Build"' in interface
          assert "$universal-build" in interface
          print("AI skill metadata is valid")
          PY

  python-core-cross-platform:
    name: python-core (${{ matrix.os }}, Python ${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python: "3.13"
          - os: macos-latest
            python: "3.13"
          - os: windows-latest
            python: "3.13"
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python }}

      - name: Validate Python core behavior
        run: python tests/test_python_core.py
