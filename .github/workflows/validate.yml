name: Validate

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shell-and-skill:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Validate Bash syntax
        run: bash -n build.sh install.sh scripts/*.sh scripts/lib/*.sh tests/test-detection.sh

      - name: Run behavior tests
        run: bash tests/test-detection.sh

      - name: Validate AI skill metadata
        run: |
          python -m pip install --disable-pip-version-check PyYAML
          python - <<'PY'
          from pathlib import Path
          import yaml

          skill_text = Path("skills/universal-build/SKILL.md").read_text(encoding="utf-8")
          _, frontmatter, body = skill_text.split("---", 2)
          skill = yaml.safe_load(frontmatter)
          interface = yaml.safe_load(
              Path("skills/universal-build/agents/openai.yaml").read_text(encoding="utf-8")
          )

          assert skill["name"] == "universal-build"
          assert skill["description"]
          assert body.strip()
          assert interface["interface"]["display_name"] == "Universal Build"
          assert "$universal-build" in interface["interface"]["default_prompt"]
          print("AI skill metadata is valid")
          PY
